schema: spec-driven

project: brain
initialized: 2026-06-30

context: |
  Tech stack: Node.js 22 + ESM (.mjs), no framework — pure CLI scripts
  Architecture: CLI tooling harness — scripts under brain/scripts/, lib modules, hooks
  VCS: GitHub — csrinaldi/brain (private repo, gh CLI for all GitHub ops)
  Package manager: npm (no lock file; scripts-only project, installed via git tags)
  Commits: conventional commits only, no AI attribution, no Co-Authored-By
  Branch policy: no direct commits to main (pre-commit hook enforced); branch + PR for all changes

strict_tdd: false

testing:
  test_command: "npm test"
  build_command: ""
  framework: "Node.js built-in (node --test)"
  coverage_available: false
  integration:
    - command: "npm run test:fresh-install"
      description: "Docker-based full fresh-install integration test (requires docker + VCS_TOKEN)"
    - command: "npm run test:upgrade"
      description: "Docker-based upgrade-safety integration test (requires docker + VCS_TOKEN)"

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference domain glossary for project-specific terms
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing patterns from the codebase
    tdd: false
    test_command: "npm test"
  verify:
    test_command: "npm test"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
