# governance.yml — Workflow Governance Layer (ADR-0014)
#
# Enforces four process invariants as PR checks. Each job name becomes the
# GitHub check context reported as "governance / <job-name>". These names are
# load-bearing: brain/scripts/vcs/governance-checks.mjs (S3) derives the required
# status-check list from them, and branch protection references them by context.
#
# Trigger: pull_request (NOT pull_request_target) — the gate needs no write
# token and must not run untrusted PR code with secrets; read scopes suffice.

name: governance
on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  # ── Invariant 1 — Every PR links an approved issue ──────────────────────────
  #
  # Chained-PR awareness: slice PRs target a feature/tracker branch (base != main)
  # and legitimately carry "Part of #N" instead of "Closes #N".  The integration
  # PR (base == main) must still use Closes|Fixes|Resolves #N.  Both patterns
  # must reference an issue labelled status:approved.
  #
  # KNOWN DIVERGENCE (issue #231 A2 phase 2 addendum, pre-existing, out of
  # scope here): this job compares BASE_BRANCH against the LITERAL 'main',
  # not the repo's actual default branch — a consumer whose default branch is
  # not 'main' inherits the wrong policy here. The Node run-check.mjs
  # issue-link case (used by GitLab, and by this run-check.test.mjs's parity
  # table) was fixed to compare against ctx.defaultBranch (the real default
  # branch) instead — see run-check.mjs's "THE ADDENDUM GOTCHA" comment.
  # Porting this bash job to the same ctx.defaultBranch-aware policy is a
  # recorded follow-up, not done in this addendum (this job stays bash).
  issue-link:
    name: issue-link
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify approved issue link
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          # grep exits 1 on no-match; || true prevents -e from aborting here —
          # we handle the empty case explicitly below.

          if [ "$BASE_BRANCH" = "main" ]; then
            # Integration PR to main: must use a closing keyword (Closes / Fixes / Resolves).
            # This closes the tracked issue and provides a definitive governance link.
            num=$(printf '%s' "$PR_BODY" \
              | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) +#[0-9]+' \
              | grep -oE '[0-9]+' | head -n1 || true)
            if [ -z "$num" ]; then
              echo "::error::PR to main must have a Closes/Fixes/Resolves #<issue> reference."
              exit 1
            fi
          else
            # Slice PR (base != main): accept "Part of #N" for chained-PR flows.
            # Also accept a closing keyword so slice PRs that target the tracker
            # branch directly still work.
            num=$(printf '%s' "$PR_BODY" \
              | grep -oiE 'part +of +#[0-9]+' \
              | grep -oE '[0-9]+' | head -n1 || true)
            if [ -z "$num" ]; then
              num=$(printf '%s' "$PR_BODY" \
                | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) +#[0-9]+' \
                | grep -oE '[0-9]+' | head -n1 || true)
            fi
            if [ -z "$num" ]; then
              echo "::error::Slice PR must have a Part of #<issue> (or Closes/Fixes/Resolves) reference."
              exit 1
            fi
          fi

          # In both cases the referenced issue must be labelled status:approved.
          # Handle gh failure explicitly: under `set -e` an unguarded non-zero
          # would abort the step with no actionable message.
          labels=$(gh api "repos/${{ github.repository }}/issues/${num}" --jq '.labels[].name') \
            || { echo "::error::Could not fetch issue #${num} (gh api failed — does it exist?)."; exit 1; }
          if ! printf '%s\n' "$labels" | grep -qx 'status:approved'; then
            echo "::error::Issue #${num} is not labeled status:approved."
            exit 1
          fi

  # ── Invariant 2 — PR diff fits within the 400-line review budget ────────────
  diff-size:
    name: diff-size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce diff size budget
        env:
          # join() flattens the label array to a space-separated string because
          # GitHub Actions has no array env — grep -qw then tests word membership.
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if printf '%s' "$LABELS" | grep -qw 'size:exception'; then
            echo "size:exception present — skipping diff-size gate."
            exit 0
          fi
          # Pipe numstat to the helper script, which reads governance.ignoreList
          # from brain.config.json in the repo root and applies glob exclusions.
          changed=$(git diff --numstat "$BASE_SHA"..."$HEAD_SHA" \
            | node brain/scripts/vcs/diff-size-count.mjs)
          echo "Changed lines (ex-ignore-list): $changed"
          if [ "$changed" -gt 400 ]; then
            echo "::error::PR changes $changed lines (>400) without size:exception."
            exit 1
          fi

  # ── Invariant 3 (L1, governance v3) — local-only checks run in CI too ───────
  #
  # repo:check, brain:nav, and npm test previously ran only in the local
  # pre-push hook (brain/scripts/hooks/pre-push), which is bypassable via
  # `git push --no-verify` or simply not installed. This job closes that gap
  # author-agnostically: it runs on every PR event covered by the workflow
  # trigger above, regardless of whether the contributor's local hook ran.
  local-checks:
    name: local-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: repo:check (structural reference checks)
        run: npm run repo:check

      - name: brain:nav (navigation/link integrity)
        run: npm run brain:nav

      - name: test (unit test suite)
        run: npm test

  # ── Invariant 4 (L3, governance v3) — session memory was captured ──────────
  #
  # Wraps the existing pure memoryPresence check: fails when no committed
  # .memory/records/ OR .memory/chunks/ observation is a session_summary
  # (transitional: both sources are unioned during the chunks→records cutover
  # window — see run-check.mjs). Thin runner keeps the logic in the tested
  # pure function (design §4).
  memory-gate:
    name: memory-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: memory-gate (session summary captured)
        env:
          # Repo metadata (never trigger identity — ADR-0016 ruling 1), mapped
          # so ci-context.mjs's loadContext() can compute ctx.defaultBranch
          # (issue #231 A2 phase 2 addendum). memory-gate itself does not
          # consume this field today; every run-check.mjs-invoking job is wired
          # uniformly so the seam degrades to null only when truly uncomputable.
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node brain/scripts/governance/run-check.mjs memory-gate

  # ── Invariant 5 (L3, governance v3) — architectural changes carry an ADR ────
  #
  # Wraps the existing pure adrPresence check over the PR's diff. Needs full
  # history (fetch-depth: 0) to diff BASE_SHA...HEAD_SHA.
  decision-gate:
    name: decision-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: decision-gate (architectural changes carry an ADR)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # See memory-gate above (issue #231 A2 phase 2 addendum).
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node brain/scripts/governance/run-check.mjs decision-gate

  # ── Invariant 6 (L4, governance v3, detection-only) — SDD phase order ──────
  #
  # Wraps evaluatePhaseOrder() over the PR's diff + touched openspec/changes/**
  # artifact state. Detection-only (DETECTION_JOBS, governance-checks.mjs):
  # runs and reports on every PR but is NOT yet required at merge — promotion
  # to REQUIRED_JOBS is a one-line move, gated on REQ-L4-5's zero-false-positive
  # acceptance run (design §7).
  phase-order:
    name: phase-order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: phase-order (SDD phase-order + artifact completeness, detection-only)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # See memory-gate above (issue #231 A2 phase 2 addendum).
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node brain/scripts/vcs/phase-order-check.mjs

  # ── Invariant 7 (L5, governance v3, detection-only) — human-approval actor ──
  #
  # Wraps evaluateActor() over the status:approved labeling history of the
  # issue referenced by the PR body. Reuses the existing `permissions: issues:
  # read` (governance.yml:19) and the same issue-number extraction rules as the
  # issue-link job. Detection-only (DETECTION_JOBS, governance-checks.mjs):
  # runs and reports on every PR but is NOT yet required at merge.
  actor-check:
    name: actor-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actor-check (status:approved actor differs from the author, detection-only)
        env:
          GH_TOKEN: ${{ github.token }}
          # PR_NUMBER lets ci-context.mjs source the author from the prView API
          # (ADR-0016 Never-do #3: never the author from env). PR_BODY stays as the
          # DETECTION-only body fallback; PR_AUTHOR removed (author now via API).
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          # See memory-gate above (issue #231 A2 phase 2 addendum).
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node brain/scripts/vcs/actor-check.mjs

  # ── Invariant 8 (L6, governance v3, detection-only) — brain-writes reviewed ─
  #
  # Wraps evaluateBrainWritesReviewed() over the PR's changed files + its
  # review history. Reuses the existing `permissions: pull-requests: read`
  # (governance.yml:18). Detection-only (DETECTION_JOBS, governance-checks.mjs):
  # runs and reports on every PR but is NOT yet required at merge — REQ-L6-1
  # evidence path (design §6.1); CODEOWNERS is a separate, optional rung-1
  # enhancement (PR6b, design §6.2).
  brain-writes-reviewed:
    name: brain-writes-reviewed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: brain-writes-reviewed (brain/core or brain/project changes carry a human review, detection-only)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # See memory-gate above (issue #231 A2 phase 2 addendum).
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: node brain/scripts/vcs/brain-writes-reviewed.mjs
